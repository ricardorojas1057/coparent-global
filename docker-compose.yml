version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coparent_postgres
    environment:
      POSTGRES_USER: coparent_admin
      POSTGRES_PASSWORD: coparent_secure_pass_2026
      POSTGRES_DB: coparent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
